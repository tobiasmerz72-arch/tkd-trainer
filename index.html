<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TKD Trainer</title>
<style>
body{font-family:Arial;background:#101318;color:white;padding:20px}
.card{background:#1b2029;padding:20px;border-radius:16px}
button,select{font-size:18px;padding:12px;margin:8px 0;width:100%}
.big{font-size:34px;font-weight:bold;margin:20px 0}
.answer{font-size:24px;color:#ffcc33}
</style>
</head>
<body>
<h1>TKD Trainer</h1>

<div class="card">
<label>Your belt</label>
<select id="belt">
<option>White</option>
<option>Yellow Stripe</option>
<option>Yellow</option>
<option>Green Stripe</option>
<option>Green</option>
<option>Blue Stripe</option>
<option>Blue</option>
<option>Red Stripe</option>
<option>Red Belt</option>
<option>Black Stripe</option>
</select>

<label>What to practise</label>
<select id="scope">
<option value="upto">White up to my belt</option>
<option value="only">This belt only</option>
</select>

<label>Mode</label>
<select id="mode">
<option value="ko2en">Korean → English</option>
<option value="en2ko">English → Korean</option>
</select>

<div id="question" class="big">Ready</div>
<div id="answer" class="answer"></div>

<button onclick="nextCard()">Start / Next</button>
<button onclick="playAudio()">🔊 Audio</button>
<button onclick="showAnswer()">Show answer</button>
</div>

<script>
const beltOrder=[
"White","Yellow Stripe","Yellow","Green Stripe","Green",
"Blue Stripe","Blue","Red Stripe","Red Belt","Black Stripe"
];

const cards=[
{belt:"White",english:"Forefist punch",korean:"Ap Joomuk Jirugi",hangul:"앞주먹 지르기"},
{belt:"White",english:"Forearm low block",korean:"Palmok Najunde Makgi",hangul:"팔목 낮은데 막기"},
{belt:"White",english:"Knifehand low block",korean:"Sonkal Najunde Makgi",hangul:"손칼 낮은데 막기"},
{belt:"White",english:"Front snap kick",korean:"Ap Cha Busigi",hangul:"앞 차 부수기"},

{belt:"Yellow Stripe",english:"Turning kick",korean:"Dollyo Chagi",hangul:"돌려 차기"},
{belt:"Yellow Stripe",english:"Forearm guarding block",korean:"Palmok Daebi Makgi",hangul:"팔목 대비 막기"},
{belt:"Yellow Stripe",english:"L-ready stance",korean:"Niunja Junbi Sogi",hangul:"니은자 준비 서기"},

{belt:"Yellow",english:"Side piercing kick",korean:"Yopcha Jirugi",hangul:"옆차 지르기"},
{belt:"Yellow",english:"Knifehand guarding block",korean:"Sonkal Daebi Makgi",hangul:"손칼 대비 막기"},
{belt:"Yellow",english:"Twin forearm block",korean:"Sang Palmok Makgi",hangul:"쌍팔목 막기"},

{belt:"Green Stripe",english:"Reverse punch",korean:"Bandae Jirugi",hangul:"반대 지르기"},
{belt:"Green Stripe",english:"Back piercing kick",korean:"Dwitcha Jirugi",hangul:"뒤차 지르기"},
{belt:"Green Stripe",english:"Outer forearm block",korean:"Pakat Palmok Makgi",hangul:"바깥팔목 막기"},

{belt:"Green",english:"Vertical kick",korean:"Sewo Chagi",hangul:"세워 차기"},
{belt:"Green",english:"Bending stance",korean:"Guburyo Sogi",hangul:"구부려 서기"},
{belt:"Green",english:"Hooking kick",korean:"Golcho Chagi",hangul:"걸쳐 차기"},

{belt:"Blue Stripe",english:"Downward kick",korean:"Naeryo Chagi",hangul:"내려 차기"},
{belt:"Blue Stripe",english:"Twin knifehand block",korean:"Sang Sonkal Makgi",hangul:"쌍손칼 막기"},
{belt:"Blue Stripe",english:"X-stance",korean:"Kyocha Sogi",hangul:"교차 서기"},

{belt:"Blue",english:"Rear foot stance",korean:"Dwitbal Sogi",hangul:"뒷발 서기"},
{belt:"Blue",english:"Flying turning kick",korean:"Twimyo Dollyo Chagi",hangul:"뛰며 돌려 차기"},
{belt:"Blue",english:"Palm pressing block",korean:"Sonbadak Noollo Makgi",hangul:"손바닥 눌러 막기"},

{belt:"Red Stripe",english:"Upward kick",korean:"Ollyo Chagi",hangul:"올려 차기"},
{belt:"Red Stripe",english:"W-shape block",korean:"San Makgi",hangul:"산 막기"},
{belt:"Red Stripe",english:"Flying back piercing kick",korean:"Twimyo Dwitcha Jirugi",hangul:"뛰며 뒤차 지르기"},

{belt:"Red Belt",english:"Palm pushing block",korean:"Sonbadak Miro Makgi",hangul:"손바닥 밀어 막기"},
{belt:"Red Belt",english:"Flying twisting kick",korean:"Twimyo Bituro Chagi",hangul:"뛰며 비틀어 차기"},
{belt:"Red Belt",english:"Hwa-Rang pattern",korean:"Hwa-Rang Tul",hangul:"화랑 틀"},

{belt:"Black Stripe",english:"X-knifehand checking block",korean:"Kyocha Sonkal Momchau Makgi",hangul:"교차 손칼 멈춰 막기"},
{belt:"Black Stripe",english:"Twin palm upward block",korean:"Sang Sonbadak Ollyo Makgi",hangul:"쌍 손바닥 올려 막기"},
{belt:"Black Stripe",english:"Choong-Moo pattern",korean:"Choong-Moo Tul",hangul:"충무 틀"}
];

let current=null;

function allowedCards(){
  const belt=document.getElementById("belt").value;
  const scope=document.getElementById("scope").value;
  const currentIndex=beltOrder.indexOf(belt);

  return cards.filter(card=>{
    const cardIndex=beltOrder.indexOf(card.belt);
    if(scope==="only") return card.belt===belt;
    return cardIndex<=currentIndex;
  });
}

function nextCard(){
  const list=allowedCards();
  current=list[Math.floor(Math.random()*list.length)];
  document.getElementById("answer").innerText="";
  const mode=document.getElementById("mode").value;
  document.getElementById("question").innerText=
    mode==="ko2en" ? current.korean : current.english;
}

function showAnswer(){
  if(!current) nextCard();
  const mode=document.getElementById("mode").value;
  document.getElementById("answer").innerText=
    mode==="ko2en" ? current.english : current.korean;
}

function playAudio(){
  if(!current) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(current.hangul || current.korean);
  u.lang="ko-KR";
  u.rate=0.75;
  speechSynthesis.speak(u);
}

nextCard();
</script>
</body>
</html>

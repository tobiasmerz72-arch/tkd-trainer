<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ITF TKD Trainer</title>
<style>
:root{
  --bg:#070a10;
  --panel:#121a28;
  --panel2:#1b2638;
  --panel3:#22314a;
  --text:#f7f9fc;
  --muted:#a9b5c9;
  --line:#314057;
  --gold:#ffd34d;
  --orange:#ff9d2e;
  --green:#39d98a;
  --red:#ff6b7a;
  --blue:#69b7ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at top left,#243a5d 0,#111827 38%,#070a10 100%);
  padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
}
.app{max-width:880px;margin:auto;padding:18px 0 34px}
.top{
  display:flex;
  align-items:center;
  gap:13px;
  margin:8px 0 15px;
}
.logo{
  width:58px;height:58px;border-radius:18px;
  background:linear-gradient(145deg,var(--gold),var(--orange));
  display:flex;align-items:center;justify-content:center;
  font-size:31px;
  box-shadow:0 16px 34px rgba(0,0,0,.4);
}
h1{margin:0;font-size:29px;letter-spacing:-.04em}
.subtitle{color:var(--muted);font-size:14px;margin-top:3px}
.panel,.card{
  background:linear-gradient(180deg,rgba(27,38,56,.96),rgba(17,25,38,.98));
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:0 18px 55px rgba(0,0,0,.36);
}
.panel{padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:650px){.grid{grid-template-columns:1fr}}
label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin:10px 0 5px;
  text-transform:uppercase;
  font-weight:800;
  letter-spacing:.055em;
}
select{
  width:100%;
  appearance:none;
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px 13px;
  font-size:17px;
  outline:none;
}
.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:9px;
  margin-top:6px;
}
.tab{
  padding:13px 8px;
  border-radius:17px;
  background:#121c2d;
  border:1px solid var(--line);
  color:var(--muted);
  font-weight:900;
  text-align:center;
  font-size:14px;
  user-select:none;
}
.tab.active{
  background:linear-gradient(145deg,var(--gold),var(--orange));
  color:#141414;
  border-color:transparent;
}
.card{
  min-height:490px;
  padding:18px;
  position:relative;
  overflow:hidden;
  transform:translateX(0);
  transition:transform .18s ease, opacity .18s ease;
}
.card.slideLeft{transform:translateX(-25px);opacity:.55}
.card.slideRight{transform:translateX(25px);opacity:.55}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border-radius:999px;
  padding:8px 11px;
  font-size:12px;
  font-weight:900;
  color:#dce8fb;
  background:#24324b;
  border:1px solid #3a4b68;
}
.pill.belt{color:#111}
.belt-White{background:#f7f7f7}
.belt-Yellow-Stripe{background:#ffe78a}
.belt-Yellow{background:#ffd400}
.belt-Green-Stripe{background:#9be789}
.belt-Green{background:#23b35b;color:white!important}
.belt-Blue-Stripe{background:#9fd0ff}
.belt-Blue{background:#1477d4;color:white!important}
.belt-Red-Stripe{background:#ff8a8a}
.belt-Red-Belt{background:#e53935;color:white!important}
.belt-Black-Stripe{background:#191919;color:white!important;border-color:#777!important}
.progressWrap{margin:6px 0 16px}
.progressTop{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;font-weight:700;margin-bottom:7px}
.progressOuter{
  height:11px;
  background:#0b111b;
  border-radius:999px;
  border:1px solid #273247;
  overflow:hidden;
}
.progressInner{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--gold),var(--orange));
  transition:width .25s ease;
}
.task{color:var(--muted);font-size:14px;margin-top:16px}
.question{
  font-size:clamp(36px,9vw,60px);
  line-height:1.03;
  font-weight:950;
  letter-spacing:-.05em;
  margin:13px 0 10px;
  word-break:break-word;
}
.hangul{
  color:var(--gold);
  font-size:clamp(27px,7vw,42px);
  font-weight:800;
  margin:4px 0 14px;
}
.answerBox{
  margin-top:14px;
  padding:16px;
  background:#0c131f;
  border:1px solid var(--line);
  border-radius:20px;
  line-height:1.48;
}
.answerMain{
  font-size:32px;
  color:var(--gold);
  font-weight:950;
  margin-bottom:8px;
}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.buttons.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:450px){.buttons.three{grid-template-columns:1fr}}
button{
  border:0;
  border-radius:18px;
  padding:16px 12px;
  font-size:17px;
  font-weight:950;
  color:var(--text);
  background:#33415c;
  box-shadow:0 8px 22px rgba(0,0,0,.25);
  touch-action:manipulation;
}
button:active{transform:scale(.98)}
.primary{background:linear-gradient(145deg,var(--gold),var(--orange));color:#141414}
.good{background:#123e2b;color:#76f0b1;border:1px solid #247e50}
.bad{background:#4a1f27;color:#ff9b9b;border:1px solid #8f3442}
.secondary{background:#183657;color:#9fd0ff;border:1px solid #2d66a2}
.hidden{display:none}
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:13px;
}
@media(max-width:520px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{
  background:#0f1724;
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
  text-align:center;
}
.stat b{font-size:22px;display:block}
.stat span{font-size:12px;color:var(--muted)}
.footer{
  color:var(--muted);
  text-align:center;
  font-size:12px;
  margin-top:13px;
}
.smallNote{font-size:12px;color:var(--muted);line-height:1.4;margin-top:10px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">🥋</div>
    <div>
      <h1>ITF TKD Trainer</h1>
      <div class="subtitle">Flashcards from your terminology list</div>
    </div>
  </div>

  <div class="panel">
    <div class="grid">
      <div>
        <label>Practice type</label>
        <select id="practiceType" onchange="handleSettingsChange()">
          <option value="common">Common Korean terms</option>
          <option value="techniques">Techniques</option>
        </select>
      </div>

      <div>
        <label>Direction</label>
        <select id="direction" onchange="handleSettingsChange()">
          <option value="ko2en">Korean → English</option>
          <option value="en2ko">English → Korean</option>
        </select>
      </div>

      <div id="beltBox">
        <label>Belt</label>
        <select id="belt" onchange="handleSettingsChange()"></select>
      </div>

      <div id="scopeBox">
        <label>Technique range</label>
        <select id="scope" onchange="handleSettingsChange()">
          <option value="upto">White up to this belt</option>
          <option value="only">This belt only</option>
        </select>
      </div>

      <div>
        <label>Category</label>
        <select id="category" onchange="handleSettingsChange()"></select>
      </div>
    </div>

    <label>Learning mode</label>
    <div class="tabs">
      <div class="tab active" id="tabRandom" onclick="setMode('random')">🎲 Random</div>
      <div class="tab" id="tabStudy" onclick="setMode('study')">📚 Study</div>
      <div class="tab" id="tabWrong" onclick="setMode('wrong')">❌ Wrong</div>
    </div>
    <div class="smallNote">Wrong mode uses cards you marked incorrect during this session.</div>
  </div>

  <div class="card" id="card" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)">
    <div class="meta" id="meta"></div>

    <div class="progressWrap">
      <div class="progressTop">
        <span id="progressLabel">0/0</span>
        <span id="deckLabel">Ready</span>
      </div>
      <div class="progressOuter">
        <div class="progressInner" id="progressBar"></div>
      </div>
    </div>

    <div class="task" id="task">Press Start.</div>
    <div id="question" class="question">Ready</div>
    <div id="hangul" class="hangul"></div>

    <div class="buttons">
      <button class="primary" onclick="nextCard()">Start / Next</button>
      <button class="secondary" onclick="playAudio()">🔊 Audio</button>
    </div>

    <button onclick="showAnswer()">Show answer</button>

    <div id="answerBox" class="answerBox hidden"></div>

    <div id="gradeBtns" class="buttons three hidden">
      <button class="good" onclick="grade(true)">✔ Correct</button>
      <button class="bad" onclick="grade(false)">✘ Incorrect</button>
      <button onclick="nextCard()">Next</button>
    </div>

    <div class="stats">
      <div class="stat"><b id="seen">0</b><span>seen</span></div>
      <div class="stat"><b id="right">0</b><span>correct</span></div>
      <div class="stat"><b id="wrong">0</b><span>wrong</span></div>
      <div class="stat"><b id="wrongDeck">0</b><span>wrong deck</span></div>
    </div>
  </div>

  <div class="footer">Swipe left or right for the next card.</div>
</div>

<script>
const BELT_ORDER = ["White","Yellow Stripe","Yellow","Green Stripe","Green","Blue Stripe","Blue","Red Stripe","Red Belt","Black Stripe"];

let COMMON_TERMS = [];
let TECHNIQUES = [];
let learnMode = "random";
let deck = [];
let wrongCards = [];
let current = null;
let studyIndex = 0;
let seen = 0, right = 0, wrong = 0;
let startX = null;

function id(x){ return document.getElementById(x); }

async function loadData(){
  try{
    COMMON_TERMS = await fetch("common_terms.json").then(r => r.json());
    TECHNIQUES = await fetch("techniques.json").then(r => r.json());
    fillSelect(id("belt"), BELT_ORDER);
    restoreSettings();
    updateControls();
    buildDeck();
    updateStats();
    nextCard(false);
  }catch(err){
    id("question").textContent = "Could not load data files";
    id("task").textContent = err.message;
  }
}

function saveSettings(){
  ["practiceType","direction","belt","scope","category"].forEach(k => {
    if(id(k)) localStorage.setItem("tkd_"+k, id(k).value);
  });
  localStorage.setItem("tkd_learnMode", learnMode);
}

function restoreSettings(){
  ["practiceType","direction","belt","scope"].forEach(k => {
    const v = localStorage.getItem("tkd_"+k);
    if(v !== null && id(k)) id(k).value = v;
  });
  const m = localStorage.getItem("tkd_learnMode");
  if(m) learnMode = m;
  updateTabs();
}

function fillSelect(el, values){
  el.innerHTML = "";
  values.forEach(v => {
    const o = document.createElement("option");
    o.value = v;
    o.textContent = v;
    el.appendChild(o);
  });
}

function unique(arr, key){
  return ["All", ...Array.from(new Set(arr.map(x => x[key]).filter(Boolean)))];
}

function updateControls(){
  const type = id("practiceType").value;
  id("beltBox").style.display = type === "techniques" ? "block" : "none";
  id("scopeBox").style.display = type === "techniques" ? "block" : "none";

  const oldCat = localStorage.getItem("tkd_category");
  const data = type === "common" ? COMMON_TERMS : TECHNIQUES;
  fillSelect(id("category"), unique(data, "category"));
  if(oldCat && Array.from(id("category").options).some(o => o.value === oldCat)){
    id("category").value = oldCat;
  }
}

function handleSettingsChange(){
  saveSettings();
  resetSession();
  updateControls();
  buildDeck();
  nextCard();
}

function setMode(mode){
  learnMode = mode;
  saveSettings();
  updateTabs();
  buildDeck();
  nextCard();
}

function updateTabs(){
  id("tabRandom").classList.toggle("active", learnMode === "random");
  id("tabStudy").classList.toggle("active", learnMode === "study");
  id("tabWrong").classList.toggle("active", learnMode === "wrong");
}

function allowedCards(){
  const type = id("practiceType").value;
  const cat = id("category").value;
  let data = type === "common" ? COMMON_TERMS : TECHNIQUES;

  if(cat !== "All") data = data.filter(x => x.category === cat);

  if(type === "techniques"){
    const belt = id("belt").value;
    const scope = id("scope").value;
    const beltIndex = BELT_ORDER.indexOf(belt);

    data = data.filter(x => {
      const itemIndex = BELT_ORDER.indexOf(x.belt);
      if(scope === "only") return x.belt === belt;
      return itemIndex >= 0 && itemIndex <= beltIndex;
    });
  }
  return data;
}

function buildDeck(){
  deck = learnMode === "wrong" ? [...wrongCards] : allowedCards();
  studyIndex = 0;
  updateProgress();
}

function nextCard(animate=true){
  const card = id("card");
  if(animate) card.classList.add(Math.random() > 0.5 ? "slideLeft" : "slideRight");

  setTimeout(() => {
    id("answerBox").classList.add("hidden");
    id("gradeBtns").classList.add("hidden");
    id("answerBox").innerHTML = "";
    id("hangul").textContent = "";

    if(!deck.length){
      current = null;
      id("question").textContent = learnMode === "wrong" ? "No wrong cards yet" : "No cards";
      id("task").textContent = learnMode === "wrong" ? "Mark cards incorrect first." : "Change selection.";
      id("meta").innerHTML = "";
      updateProgress();
      card.classList.remove("slideLeft","slideRight");
      return;
    }

    if(learnMode === "study"){
      current = deck[studyIndex % deck.length];
      studyIndex++;
    }else{
      current = deck[Math.floor(Math.random() * deck.length)];
    }

    const dir = id("direction").value;
    id("question").textContent = dir === "ko2en" ? current.korean : current.english;
    id("task").textContent = dir === "ko2en" ? "Translate to English" : "Think of the Korean";
    id("hangul").textContent = dir === "ko2en" ? (current.hangul || "") : "";

    renderMeta();
    updateProgress();
    card.classList.remove("slideLeft","slideRight");
  }, animate ? 130 : 0);
}

function renderMeta(){
  if(!current) return;
  let html = "";
  if(id("practiceType").value === "techniques" && current.belt){
    const cls = "belt-" + current.belt.replaceAll(" ","-");
    html += `<span class="pill belt ${cls}">${current.belt}</span>`;
  }
  html += `<span class="pill">${current.category || "Common"}</span>`;
  id("meta").innerHTML = html;
}

function showAnswer(){
  if(!current) return;
  const dir = id("direction").value;
  const main = dir === "ko2en" ? current.english : current.korean;

  let html = `<div class="answerMain">${main}</div>`;
  html += `<b>English:</b> ${current.english}<br>`;
  html += `<b>Korean:</b> ${current.korean}<br>`;
  if(current.hangul) html += `<b>Hangul:</b> ${current.hangul}<br>`;
  if(current.belt) html += `<b>Belt:</b> ${current.belt}<br>`;
  html += `<b>Category:</b> ${current.category || "Common"}`;

  id("answerBox").innerHTML = html;
  id("answerBox").classList.remove("hidden");
  id("gradeBtns").classList.remove("hidden");

  if(dir === "en2ko") playAudio();
}

function grade(ok){
  if(!current) return;
  seen++;
  if(ok){
    right++;
    wrongCards = wrongCards.filter(c => cardKey(c) !== cardKey(current));
  }else{
    wrong++;
    if(!wrongCards.some(c => cardKey(c) === cardKey(current))){
      wrongCards.push(current);
    }
  }
  updateStats();
  if(learnMode === "wrong") buildDeck();
  nextCard();
}

function cardKey(c){
  return [c.english,c.korean,c.belt || "",c.category || ""].join("|");
}

function updateStats(){
  id("seen").textContent = seen;
  id("right").textContent = right;
  id("wrong").textContent = wrong;
  id("wrongDeck").textContent = wrongCards.length;
}

function updateProgress(){
  const total = deck.length;
  let currentNum = 0;

  if(total){
    if(learnMode === "study"){
      currentNum = Math.min(studyIndex + 1, total);
    }else{
      currentNum = Math.min(seen + 1, total);
    }
  }

  id("progressLabel").textContent = total ? `${currentNum}/${total}` : "0/0";
  id("progressBar").style.width = total ? `${Math.min(100,(currentNum/total)*100)}%` : "0%";
  id("deckLabel").textContent = learnMode === "random" ? "Random" : learnMode === "study" ? "Study" : "Wrong only";
}

function resetSession(){
  seen = 0;
  right = 0;
  wrong = 0;
  wrongCards = [];
  updateStats();
}

function playAudio(){
  if(!current || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const text = current.hangul || current.korean;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = current.hangul ? "ko-KR" : "en-US";
  u.rate = 0.75;
  speechSynthesis.speak(u);
}

function touchStart(e){
  startX = e.changedTouches[0].screenX;
}

function touchEnd(e){
  if(startX === null) return;
  const endX = e.changedTouches[0].screenX;
  if(Math.abs(endX - startX) > 55) nextCard();
  startX = null;
}

loadData();
</script>
</body>
</html>

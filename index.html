<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TKD Trainer</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#101318;color:white;padding:18px;margin:0}
.app{max-width:780px;margin:auto}
.card{background:#1b2029;padding:18px;border-radius:18px;border:1px solid #333b4a;margin-top:14px}
label{display:block;color:#aab4c4;font-size:13px;margin-top:10px;margin-bottom:4px}
button,select{font-size:17px;padding:12px;margin:6px 0;width:100%;box-sizing:border-box;border-radius:12px;border:1px solid #333b4a}
select{background:#222936;color:white}
button{background:#31394a;color:white;font-weight:700;border:0}
.primary{background:#ffcc33;color:#111}
.big{font-size:36px;font-weight:800;margin:18px 0;line-height:1.1}
.answer{font-size:24px;color:#ffcc33;margin-top:14px;line-height:1.35}
.meta{color:#aab4c4;font-size:13px;margin-top:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.row{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="app">
<h1>ITF TKD Trainer</h1>
<p style="color:#aab4c4">Practise common Korean terms or belt-specific techniques.</p>

<div class="card">
<div class="row">

<div>
<label>Practice type</label>
<select id="practiceType" onchange="updateControls(); nextCard()">
<option value="common">Common Korean terms</option>
<option value="techniques">Techniques</option>
</select>
</div>

<div>
<label>Direction</label>
<select id="direction" onchange="nextCard()">
<option value="ko2en">Korean → English</option>
<option value="en2ko">English → Korean</option>
</select>
</div>

<div id="beltBox">
<label>Belt</label>
<select id="belt" onchange="nextCard()"></select>
</div>

<div id="scopeBox">
<label>Technique range</label>
<select id="scope" onchange="nextCard()">
<option value="upto">White up to this belt</option>
<option value="only">This belt only</option>
</select>
</div>

<div>
<label>Category</label>
<select id="category" onchange="nextCard()"></select>
</div>

</div>
</div>

<div class="card">
<div id="meta" class="meta"></div>
<div id="question" class="big">Ready</div>
<button class="primary" onclick="nextCard()">Start / Next</button>
<button onclick="playAudio()">🔊 Audio</button>
<button onclick="showAnswer()">Show answer</button>
<div id="answer" class="answer"></div>
</div>
</div>

<script>
const BELT_ORDER = [
"White","Yellow Stripe","Yellow","Green Stripe","Green",
"Blue Stripe","Blue","Red Stripe","Red Belt","Black Stripe"
];

let COMMON_TERMS = [];
let TECHNIQUES = [];
let current = null;

function id(x){return document.getElementById(x);}

async function loadData(){
  COMMON_TERMS = await fetch("common_terms.json").then(r=>r.json());
  TECHNIQUES = await fetch("techniques.json").then(r=>r.json());
  fillSelect(id("belt"), BELT_ORDER);
  updateControls();
  nextCard();
}

function unique(arr,key){
  return ["All",...Array.from(new Set(arr.map(x=>x[key]).filter(Boolean)))];
}

function fillSelect(el,values){
  el.innerHTML="";
  values.forEach(v=>{
    const o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    el.appendChild(o);
  });
}

function updateControls(){
  const type=id("practiceType").value;
  id("beltBox").style.display=type==="techniques"?"block":"none";
  id("scopeBox").style.display=type==="techniques"?"block":"none";

  const data=type==="common"?COMMON_TERMS:TECHNIQUES;
  fillSelect(id("category"), unique(data,"category"));
}

function allowedCards(){
  const type=id("practiceType").value;
  const cat=id("category").value;

  let data=type==="common"?COMMON_TERMS:TECHNIQUES;

  if(cat!=="All"){
    data=data.filter(x=>x.category===cat);
  }

  if(type==="techniques"){
    const belt=id("belt").value;
    const scope=id("scope").value;
    const beltIndex=BELT_ORDER.indexOf(belt);

    data=data.filter(x=>{
      const itemIndex=BELT_ORDER.indexOf(x.belt);
      if(scope==="only") return x.belt===belt;
      return itemIndex>=0 && itemIndex<=beltIndex;
    });
  }

  return data;
}

function nextCard(){
  const list=allowedCards();
  id("answer").innerHTML="";

  if(!list.length){
    current=null;
    id("question").textContent="No cards for this selection";
    id("meta").textContent="";
    return;
  }

  current=list[Math.floor(Math.random()*list.length)];

  const dir=id("direction").value;
  id("question").textContent=dir==="ko2en" ? current.korean : current.english;

  id("meta").textContent =
    id("practiceType").value==="common"
    ? current.category
    : current.belt+" • "+current.category;
}

function showAnswer(){
  if(!current) nextCard();
  if(!current) return;

  const dir=id("direction").value;
  const main=dir==="ko2en" ? current.english : current.korean;

  let html="<b>"+main+"</b>";

  if(current.hangul){
    html+="<br><span style='color:white'>"+current.hangul+"</span>";
  }

  if(current.belt){
    html+="<br><span style='color:#aab4c4'>"+current.belt+" • "+current.category+"</span>";
  } else {
    html+="<br><span style='color:#aab4c4'>"+current.category+"</span>";
  }

  id("answer").innerHTML=html;
}

function playAudio(){
  if(!current || !window.speechSynthesis) return;

  speechSynthesis.cancel();

  const text=current.hangul || current.korean;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=current.hangul ? "ko-KR" : "en-US";
  u.rate=0.75;

  speechSynthesis.speak(u);
}

loadData();
</script>
</body>
</html>
